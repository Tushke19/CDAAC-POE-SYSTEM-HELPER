<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDAAC PoE - The Vibe Car</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/models/coco-ssd"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cockpit">
        <header>
            <h1>CDAAC: AUTOMATED POE SYSTEM</h1>
            <p>Reality Check Status: <span id="reality-status">WAITING... </span></p>
        </header>

        <main class="grid">
            <section class="video-feed">
                <div class="monitor">
                    <video id="webcam" autoplay muted playsinline></video>
                    <div class="scanline"></div>
                </div>
                <div class="controls">
                    <input type="file" id="manualUpload" accept="video/*">
                    <button onclick="startAuto()">START SYSTEM </button>
                </div>
            </section>

            <section class="quiz-panel">
                <h3>Automated Assessment </h3>
                <div class="quiz-item">
                    <label>PoE Verified: </label>
                    <input type="checkbox" id="poeCheck" disabled>
                </div>
                <div class="log-box" id="eventLog">
                    <p>[SYSTEM] Booting... </p>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
